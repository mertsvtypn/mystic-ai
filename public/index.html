<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mystic AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0612;--surface:#120d1e;--border:rgba(180,140,255,0.15);--purple:#9b6dff;--purple-light:#c4a0ff;--gold:#d4af70;--gold-light:#f0d090;--text:#e8e0f0;--muted:#8878a0;}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:18px;line-height:1.7;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(100,50,180,0.12) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(60,20,120,0.1) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite;animation-delay:var(--delay,0s);opacity:var(--op,0.4);}
    @keyframes twinkle{0%,100%{opacity:var(--op,0.4);}50%{opacity:0.1;}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
    @keyframes pulse-orb{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(124,58,237,0.4);}50%{transform:scale(1.1);box-shadow:0 0 40px rgba(124,58,237,0.6);}}
    @keyframes fade-text{0%,100%{opacity:0.4;}50%{opacity:1;}}
    @keyframes shimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes particleFloat{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-60px) scale(0);opacity:0;}}
    .page{position:relative;z-index:1;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem 0;}
    .nav-tabs{display:flex;gap:8px;}
    .nav-tab{padding:6px 18px;background:transparent;border:1px solid var(--border);border-radius:20px;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.1em;cursor:pointer;color:var(--muted);transition:all 0.2s;}
    .nav-tab.active{border-color:var(--purple);color:var(--purple-light);background:rgba(155,109,255,0.1);}
    .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
    .lang-btn{padding:4px 14px;font-family:'Cinzel',serif;font-size:0.65rem;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s;}
    .lang-btn.active{background:rgba(155,109,255,0.3);color:var(--purple-light);}
    #landing{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem 1.5rem 2rem;text-align:center;}
    .orb{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed 50%,#2d1060);margin:0 auto 1.25rem;animation:float 6s ease-in-out infinite;box-shadow:0 0 40px rgba(124,58,237,0.4),0 0 80px rgba(124,58,237,0.15);}
    .logo{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:600;letter-spacing:0.08em;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--purple-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.3rem;}
    .tagline{font-size:0.95rem;color:var(--muted);font-style:italic;margin-bottom:1.25rem;}
    .cat-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;justify-content:center;}
    .cat-tab{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;cursor:pointer;color:var(--muted);transition:all 0.2s;white-space:nowrap;}
    .cat-tab:hover,.cat-tab.active{border-color:var(--purple);color:var(--purple-light);}
    .cat-tab.active{background:rgba(155,109,255,0.15);}
    .form-card{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.5rem;}
    .field{margin-bottom:1.1rem;}
    .field label{display:block;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:0.4rem;}
    .field input,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:0.65rem 1rem;color:var(--text);font-family:'Crimson Pro',serif;font-size:1rem;outline:none;transition:border-color 0.2s;}
    .field input:focus,.field textarea:focus{border-color:rgba(155,109,255,0.5);background:rgba(155,109,255,0.05);}
    .field textarea{resize:none;height:72px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
    .sign-btn{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:6px 3px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--muted);font-family:'Crimson Pro',serif;}
    .sign-btn:hover,.sign-btn.active{border-color:var(--purple);color:var(--purple-light);}
    .sign-btn.active{background:rgba(155,109,255,0.15);}
    .sign-btn .icon{font-size:1.1rem;display:block;}
    .sign-btn .name{font-size:0.55rem;}
    .upload-zone{border:2px dashed rgba(155,109,255,0.3);border-radius:12px;padding:1.25rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
    .upload-zone:hover{border-color:var(--purple);background:rgba(155,109,255,0.05);}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .upload-text{font-size:0.85rem;color:var(--muted);}
    .upload-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .preview-wrap{position:relative;}
    .preview-img{width:65px;height:65px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block;}
    .preview-rm{position:absolute;top:-6px;right:-6px;background:#7c3aed;color:white;width:16px;height:16px;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none;}
    .card-count-row{display:flex;gap:8px;justify-content:center;margin-bottom:0.75rem;flex-wrap:wrap;}
    .count-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;}
    .count-btn:hover,.count-btn.active{border-color:var(--purple);background:rgba(155,109,255,0.2);color:var(--purple-light);}
    .free-note{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:0.9rem;font-style:italic;}
    .cta{width:100%;padding:0.9rem;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:12px;color:white;font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
    .cta:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(124,58,237,0.4);}
    .cta:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    #result{display:none;min-height:100vh;padding:2rem 1.5rem 3rem;}
    .result-inner{max-width:560px;margin:0 auto;}
    .result-header{text-align:center;margin-bottom:1.75rem;}
    .result-orb{width:65px;height:65px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed 50%,#2d1060);margin:0 auto 0.9rem;box-shadow:0 0 30px rgba(124,58,237,0.4);animation:float 6s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
    .result-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold-light);margin-bottom:0.2rem;}
    .result-subtitle{font-size:0.82rem;color:var(--muted);font-style:italic;}
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:1.1rem 0;}
    .section-title{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.4rem;}
    .section-text{font-size:0.98rem;color:var(--text);line-height:1.85;font-weight:300;}
    .prophecy{background:rgba(155,109,255,0.08);border:1px solid rgba(155,109,255,0.2);border-radius:12px;padding:1.1rem 1.3rem;font-style:italic;color:var(--purple-light);font-size:0.98rem;line-height:1.8;text-align:center;}
    .loading-section{text-align:center;padding:2rem 0;}
    .loading-orb{width:55px;height:55px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed);margin:0 auto 1.25rem;animation:pulse-orb 1.5s ease-in-out infinite;}
    .loading-text{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.15em;color:var(--muted);animation:fade-text 2s ease-in-out infinite;}
    .action-row{display:flex;gap:10px;margin-top:1.25rem;}
    .btn-sec{flex:1;padding:0.7rem;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Crimson Pro',serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
    .btn-sec:hover{border-color:var(--purple);color:var(--purple-light);}
    .btn-pri{flex:1;padding:0.7rem;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:10px;color:white;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;cursor:pointer;}
    #history-section{max-width:500px;margin:0 auto;padding:1.5rem;display:none;}
    .history-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);margin-bottom:1rem;text-align:center;}
    .history-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:0.7rem;cursor:pointer;transition:border-color 0.2s;}
    .history-item:hover{border-color:var(--purple);}
    .history-meta{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);margin-bottom:0.25rem;}
    .history-preview{font-size:0.88rem;color:var(--text);opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .disclaimer{text-align:center;font-size:0.72rem;color:var(--muted);font-style:italic;margin-top:1.25rem;opacity:0.6;}

    /* ── TAROT ── */
    .tarot-spread{display:flex;gap:10px;justify-content:center;margin:1.5rem 0 1.25rem;overflow-x:auto;padding:4px 4px 12px;}
    .tarot-card-wrap{perspective:1400px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
    .tarot-card{width:105px;aspect-ratio:0.63;position:relative;transform-style:preserve-3d;transition:transform 1.2s cubic-bezier(0.23,1,0.32,1);border-radius:10px;}
    .tarot-card.flipped{transform:rotateY(180deg);}
    .card-face{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}
    .card-back-face{background:linear-gradient(150deg,#1e0f40 0%,#0e0820 100%);border:1.5px solid rgba(212,175,112,0.3);box-shadow:0 6px 28px rgba(0,0,0,0.8),0 0 0 1px rgba(155,109,255,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
    .cbm{width:58%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(212,175,112,0.18);display:flex;align-items:center;justify-content:center;position:relative;}
    .cbm::before{content:'';position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(212,175,112,0.1);}
    .cbm::after{content:'✦';font-size:1.2rem;color:rgba(212,175,112,0.4);}
    .cbt{font-family:'Cinzel',serif;font-size:0.36rem;letter-spacing:0.18em;color:rgba(212,175,112,0.25);text-transform:uppercase;}
    .card-front-face{transform:rotateY(180deg);background:#080514;border:1.5px solid rgba(212,175,112,0.45);box-shadow:0 0 30px rgba(124,58,237,0.25),0 8px 40px rgba(0,0,0,0.9);overflow:hidden;}
    .card-front-face img{width:100%;height:100%;object-fit:cover;display:block;}
    .card-sheen{position:absolute;inset:0;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,0.12) 50%,transparent 65%);transform:translateX(-200%);animation:shimmer 0.9s ease forwards;}
    .card-lbl{margin-top:7px;text-align:center;opacity:0;transform:translateY(5px);transition:opacity 0.5s ease 0.3s,transform 0.5s ease 0.3s;}
    .card-lbl.show{opacity:1;transform:translateY(0);}
    .card-lbl-name{font-family:'Cinzel',serif;font-size:0.5rem;letter-spacing:0.07em;color:var(--gold);text-transform:uppercase;line-height:1.3;}
    .card-lbl-pos{font-size:0.48rem;color:var(--muted);font-style:italic;margin-top:1px;}
    .tarot-interp{margin-top:0.5rem;opacity:0;transform:translateY(14px);transition:opacity 0.7s ease,transform 0.7s ease;}
    .tarot-interp.show{opacity:1;transform:translateY(0);}
    .tarot-interp p{font-size:1rem;color:var(--text);line-height:1.88;font-weight:300;margin-bottom:0.8rem;}
    .tarot-interp p:last-child{margin-bottom:0;}
    .tarot-interp-box{background:rgba(155,109,255,0.07);border:1px solid rgba(155,109,255,0.18);border-radius:14px;padding:1.2rem 1.4rem;}
    .particle{position:fixed;pointer-events:none;border-radius:50%;animation:particleFloat 1.2s ease forwards;}
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="page">
  <div class="top-bar">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('home')" id="tab-home">Fal Bak</button>
      <button class="nav-tab" onclick="showTab('history')" id="tab-history">Geçmiş</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('tr')" id="lang-tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" id="lang-en">EN</button>
    </div>
  </div>

  <section id="landing">
    <div class="orb"></div>
    <h1 class="logo">Mystic AI</h1>
    <p class="tagline" id="tagline">Yıldızlar seni bekliyordu</p>
    <div class="cat-tabs">
      <button class="cat-tab active" onclick="setCat('zodiac')" id="cat-zodiac">♈ Burç Falı</button>
      <button class="cat-tab" onclick="setCat('tarot')" id="cat-tarot">🃏 Tarot</button>
      <button class="cat-tab" onclick="setCat('numerology')" id="cat-numerology">🔢 Numeroloji</button>
      <button class="cat-tab" onclick="setCat('dream')" id="cat-dream">🌙 Rüya</button>
      <button class="cat-tab" onclick="setCat('coffee')" id="cat-coffee">☕ Kahve Falı</button>
    </div>
    <div class="form-card">
      <div class="field"><label id="lbl-name">İsmin</label><input id="name" type="text" placeholder="örn. Ayşe" autocomplete="off"/></div>
      <div class="row2">
        <div class="field"><label id="lbl-bdate">Doğum Tarihi</label><input id="birthdate" type="date"/></div>
        <div class="field"><label id="lbl-btime">Doğum Saati</label><input id="birthtime" type="time"/></div>
      </div>
      <div class="field" id="sign-field">
        <label id="lbl-sign">Burcun</label>
        <div class="sign-grid" id="sign-grid">
          <button class="sign-btn" data-tr="Koç" data-en="Aries"><span class="icon">♈</span><span class="name">Koç</span></button>
          <button class="sign-btn" data-tr="Boğa" data-en="Taurus"><span class="icon">♉</span><span class="name">Boğa</span></button>
          <button class="sign-btn" data-tr="İkizler" data-en="Gemini"><span class="icon">♊</span><span class="name">İkizler</span></button>
          <button class="sign-btn" data-tr="Yengeç" data-en="Cancer"><span class="icon">♋</span><span class="name">Yengeç</span></button>
          <button class="sign-btn" data-tr="Aslan" data-en="Leo"><span class="icon">♌</span><span class="name">Aslan</span></button>
          <button class="sign-btn" data-tr="Başak" data-en="Virgo"><span class="icon">♍</span><span class="name">Başak</span></button>
          <button class="sign-btn" data-tr="Terazi" data-en="Libra"><span class="icon">♎</span><span class="name">Terazi</span></button>
          <button class="sign-btn" data-tr="Akrep" data-en="Scorpio"><span class="icon">♏</span><span class="name">Akrep</span></button>
          <button class="sign-btn" data-tr="Yay" data-en="Sagittarius"><span class="icon">♐</span><span class="name">Yay</span></button>
          <button class="sign-btn" data-tr="Oğlak" data-en="Capricorn"><span class="icon">♑</span><span class="name">Oğlak</span></button>
          <button class="sign-btn" data-tr="Kova" data-en="Aquarius"><span class="icon">♒</span><span class="name">Kova</span></button>
          <button class="sign-btn" data-tr="Balık" data-en="Pisces"><span class="icon">♓</span><span class="name">Balık</span></button>
        </div>
      </div>
      <div class="field" id="tarot-count-field" style="display:none;">
        <label id="lbl-cardcount">Kaç Kart Çekilsin?</label>
        <div class="card-count-row">
          <button class="count-btn" data-count="1" onclick="setCardCount(1)">1</button>
          <button class="count-btn active" data-count="3" onclick="setCardCount(3)">3</button>
          <button class="count-btn" data-count="5" onclick="setCardCount(5)">5</button>
        </div>
      </div>
      <div class="field" id="dream-field" style="display:none;"><label id="lbl-dream">Rüyanı Anlat</label><textarea id="dream-input" placeholder="Rüyanda ne gördüğünü detaylıca anlat..."></textarea></div>
      <div class="field" id="coffee-field" style="display:none;">
        <label id="lbl-coffee">Kahve Fincanı Fotoğrafı (max 6)</label>
        <div class="upload-zone"><input type="file" id="coffee-input" accept="image/*" multiple onchange="handleImages(event)"/><div style="font-size:1.8rem;margin-bottom:0.4rem;">☕</div><p class="upload-text" id="upload-text">Fincanın fotoğrafını yükle veya tıkla</p></div>
        <div class="upload-preview" id="upload-preview"></div>
      </div>
      <div class="field" id="question-field"><label id="lbl-q">Evrene Sor (isteğe bağlı)</label><textarea id="question" placeholder="Bu yıl aşk bulacak mıyım?..."></textarea></div>
      <p class="free-note" id="free-note">✦ Bugün 3 ücretsiz okuma ✦</p>
      <button class="cta" id="cta-btn" onclick="startReading()">Falıma Bak ✦</button>
    </div>
    <p class="disclaimer">✦ Sadece eğlence amaçlıdır ✦</p>
  </section>

  <section id="result">
    <div class="result-inner">
      <div class="result-header">
        <div class="result-orb" id="result-icon">🔮</div>
        <h2 class="result-title" id="result-name">—</h2>
        <p class="result-subtitle" id="result-date">—</p>
      </div>
      <div id="reading-content"></div>
      <div class="action-row" id="action-row" style="display:none;">
        <button class="btn-sec" onclick="resetForm()" id="btn-again">Tekrar Bak</button>
        <button class="btn-pri" onclick="shareReading()" id="btn-share">Paylaş ✦</button>
      </div>
      <p class="disclaimer">✦ Sadece eğlence amaçlıdır ✦</p>
    </div>
  </section>

  <section id="history-section">
    <h2 class="history-title" id="history-title">Fal Geçmişin</h2>
    <div id="history-list"></div>
    <p id="history-empty" style="text-align:center;color:var(--muted);font-style:italic;font-size:0.9rem;">Henüz fal baktırmadın.</p>
  </section>
</div>

<script>
// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.2+Math.random()*0.6};width:${Math.random()<0.8?1:2}px;height:${Math.random()<0.8?1:2}px`;starsEl.appendChild(s);}

let lang='tr', tarotCardCount=3, selectedSign='', currentCat='zodiac', uploadedImages=[];

function setCardCount(n){tarotCardCount=n;document.querySelectorAll('.count-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.count)===n));}

const T={
  tr:{tagline:'Yıldızlar seni bekliyordu',tabHome:'Fal Bak',tabHist:'Geçmiş',lblName:'İsmin',lblBdate:'Doğum Tarihi',lblBtime:'Doğum Saati',lblSign:'Burcun',lblDream:'Rüyanı Anlat',lblCoffee:'Kahve Fincanı Fotoğrafı (max 6)',uploadTxt:'Fincanın fotoğrafını yükle veya tıkla',lblQ:'Evrene Sor (isteğe bağlı)',freeNote:'✦ Bugün 3 ücretsiz okuma ✦',ctaBtn:'Falıma Bak ✦',histTitle:'Fal Geçmişin',histEmpty:'Henüz fal baktırmadın.',btnAgain:'Tekrar Bak',btnShare:'Paylaş ✦',loading:'Kozmik titreşimler okunuyor...',noName:'Lütfen ismini gir',noSign:'Lütfen burcunu seç',noDream:'Lütfen rüyanı anlat',noPhoto:'Lütfen en az 1 fotoğraf yükle',copied:'Kopyalandı!',
   cats:{zodiac:'♈ Burç Falı',tarot:'🃏 Tarot',numerology:'🔢 Numeroloji',dream:'🌙 Rüya',coffee:'☕ Kahve Falı'},

  lang=l;

  document.getElementById('lang-en').classList.toggle('active',l==='en');
  const t=T[l];
  document.getElementById('tagline').textContent=t.tagline;
  document.getElementById('tab-home').textContent=t.tabHome;
  document.getElementById('tab-history').textContent=t.tabHist;
  document.getElementById('lbl-name').textContent=t.lblName;
  document.getElementById('lbl-bdate').textContent=t.lblBdate;
  document.getElementById('lbl-btime').textContent=t.lblBtime;
  document.getElementById('lbl-sign').textContent=t.lblSign;
  document.getElementById('lbl-dream').textContent=t.lblDream;
  document.getElementById('lbl-coffee').textContent=t.lblCoffee;
  document.getElementById('upload-text').textContent=t.uploadTxt;
  document.getElementById('lbl-q').textContent=t.lblQ;
  document.getElementById('free-note').textContent=t.freeNote;
  document.getElementById('cta-btn').textContent=t.ctaBtn;
  document.getElementById('history-title').textContent=t.histTitle;
  document.getElementById('history-empty').textContent=t.histEmpty;
  document.getElementById('btn-again').textContent=t.btnAgain;
  document.getElementById('btn-share').textContent=t.btnShare;
  document.getElementById('name').placeholder=t.namePh;
  document.getElementById('question').placeholder=t.qPh;
  document.getElementById('dream-input').placeholder=t.dreamPh;
  document.querySelectorAll('.cat-tab').forEach(b=>{const id=b.id.replace('cat-','');b.textContent=t.cats[id]||b.textContent;});
  document.querySelectorAll('.sign-btn').forEach(b=>{const n=b.querySelector('.name');if(n)n.textContent=b.dataset[l]||n.textContent;});
  if(document.getElementById('lbl-cardcount'))document.getElementById('lbl-cardcount').textContent=l==='tr'?'Kaç Kart Çekilsin?':'How Many Cards?';
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.toggle('active',b.id==='cat-'+cat));
  document.getElementById('sign-field').style.display=cat==='zodiac'?'block':'none';
  document.getElementById('tarot-count-field').style.display=cat==='tarot'?'block':'none';
  document.getElementById('dream-field').style.display=cat==='dream'?'block':'none';
  document.getElementById('coffee-field').style.display=cat==='coffee'?'block':'none';
  document.getElementById('question-field').style.display=cat==='coffee'?'none':'block';
}

document.getElementById('sign-grid').addEventListener('click',e=>{
  const btn=e.target.closest('.sign-btn');if(!btn)return;
  document.querySelectorAll('.sign-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');selectedSign=btn.dataset[lang]||btn.dataset.en;
});

function handleImages(e){
  const files=Array.from(e.target.files);
  files.forEach(f=>{
    if(uploadedImages.length>=6)return;
    const r=new FileReader();
    r.onload=ev=>{uploadedImages.push({base64:ev.target.result.split(',')[1],type:f.type});renderPreviews();};
    r.readAsDataURL(f);
  });
}
function renderPreviews(){
  document.getElementById('upload-preview').innerHTML=uploadedImages.map((_,i)=>`<div class="preview-wrap"><img class="preview-img" src="data:${uploadedImages[i].type};base64,${uploadedImages[i].base64}"/><button class="preview-rm" onclick="removeImg(${i})">×</button></div>`).join('');
}
function removeImg(i){uploadedImages.splice(i,1);renderPreviews();}

function showTab(tab){
  document.getElementById('tab-home').classList.toggle('active',tab==='home');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  document.getElementById('landing').style.display=tab==='home'?'flex':'none';
  document.getElementById('result').style.display='none';
  document.getElementById('history-section').style.display=tab==='history'?'block':'none';
  if(tab==='history')renderHistory();
}

function getHist(){try{return JSON.parse(localStorage.getItem('myst_hist')||'[]');}catch{return[];}}
function saveHist(item){const h=getHist();h.unshift(item);localStorage.setItem('myst_hist',JSON.stringify(h.slice(0,20)));}
function renderHistory(){
  const h=getHist(),list=document.getElementById('history-list'),empty=document.getElementById('history-empty');
  if(!h.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=h.map((item,i)=>`<div class="history-item" onclick="viewHist(${i})"><div class="history-meta"><span>${item.icon} ${item.cat} · ${item.name}</span><span>${item.date}</span></div><div class="history-preview">${item.preview}</div></div>`).join('');
}
function viewHist(i){
  const item=getHist()[i];showTab('home');
  document.getElementById('landing').style.display='none';document.getElementById('result').style.display='block';
  document.getElementById('result-icon').textContent=item.icon||'🔮';document.getElementById('result-name').textContent=item.name;
  document.getElementById('result-date').textContent=item.date;document.getElementById('reading-content').innerHTML=item.html;
  document.getElementById('action-row').style.display='flex';
}

function getCardImg(englishName){
  if(!englishName)return RW.default;
  const key=Object.keys(RW).find(k=>k.toLowerCase()===englishName.toLowerCase());
  return key?RW[key]:RW.default;
}

async function startReading(){
  const t=T[lang],name=document.getElementById('name').value.trim(),bd=document.getElementById('birthdate').value,bt=document.getElementById('birthtime').value,q=document.getElementById('question').value.trim(),dr=document.getElementById('dream-input').value.trim();
  if(!name){alert(t.noName);return;}
  if(currentCat==='zodiac'&&!selectedSign){alert(t.noSign);return;}
  if(currentCat==='dream'&&!dr){alert(t.noDream);return;}
  if(currentCat==='coffee'&&!uploadedImages.length){alert(t.noPhoto);return;}

  document.getElementById('landing').style.display='none';document.getElementById('result').style.display='block';window.scrollTo(0,0);
  const icons={zodiac:'🔮',tarot:'🃏',numerology:'🔢',dream:'🌙',coffee:'☕'};
  document.getElementById('result-icon').textContent=icons[currentCat];
  document.getElementById('result-name').textContent=name+(selectedSign?' · '+selectedSign:'');
  document.getElementById('result-date').textContent=new Date().toLocaleDateString(lang==='tr'?'tr-TR':'en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('action-row').style.display='none';
  document.getElementById('reading-content').innerHTML=`<div class="loading-section"><div class="loading-orb"></div><p class="loading-text">${t.loading}</p></div>`;

  const li=lang==='tr'?'Türkçe yanıt ver. Kart isimlerini İNGİLİZCE yaz (örn: The Lovers, The Moon).':'Reply in English.';
  const bdi=bd?`\nBirth date: ${bd}.`:'',bti=bt?`\nBirth time: ${bt}.`:'',qi=q?`\nQuestion: "${q}"`:'';
  let prompt='',msgContent=null;

  if(currentCat==='zodiac'){
    prompt=`You are a masterful mystical fortune teller. Give a deeply personalized reading for ${name}, ${selectedSign}.${bdi}${bti}${qi}\n${li}\nOnly raw JSON: {"overall":"2-3 evocative sentences about cosmic energy, use their sign's traits","love":"2 rich sentences about love life","money":"2 rich sentences about finances and career","advice":"One unforgettable poetic prophecy, 1-2 sentences"}`;
  }
  else if(currentCat==='tarot'){
    const pos3=lang==='tr'?['Geçmiş','Şimdi','Gelecek']:['Past','Present','Future'];
    const pos5=lang==='tr'?['Geçmiş','Şimdi','Gelecek','Engel','Tavsiye']:['Past','Present','Future','Challenge','Advice'];
    const pos1=lang==='tr'?['Mesaj']:['Message'];
    const positions=tarotCardCount===1?pos1:tarotCardCount===3?pos3:pos5;
    const cardJson=positions.map((_,i)=>`"card${i+1}":{"englishName":"EXACT English Rider-Waite card name","displayName":"${lang==='tr'?'Turkish card name':'Same English name'}","position":"${positions[i]}"}`).join(',');
    prompt=`You are a master tarot reader. Draw ${tarotCardCount} distinct Rider-Waite tarot cards for ${name}.${qi}\n${li}\nIMPORTANT: englishName must be the EXACT official Rider-Waite card name in English (e.g. "The Lovers", "The Moon", "Ace of Cups"). Each card must be DIFFERENT.\nOnly raw JSON: {${cardJson},"interpretation":"Write a flowing, deeply insightful ${tarotCardCount===1?'1':tarotCardCount===3?'2':'3'}-paragraph interpretation (no bullet points, no card-by-card breakdown). Weave all cards together into one cohesive mystical narrative about ${name}'s situation${q?' regarding: '+q:''}. Write as a wise oracle speaking directly to ${name}. Rich, evocative language. Each paragraph 3-4 sentences."}`;
  }
  else if(currentCat==='numerology'){
    prompt=`You are a numerology master. Analyze ${name}.${bdi}${bti}${qi}\n${li}\nOnly raw JSON: {"life_number":"Life path number and 2-sentence meaning","destiny":"Destiny number and 2-sentence meaning","year":"This year's energy in 2 sentences","advice":"One powerful numerological prophecy"}`;
  }
  else if(currentCat==='dream'){
    prompt=`You are a mystical dream interpreter. Interpret ${name}'s dream: "${dr}"${bdi}\n${li}\nOnly raw JSON: {"symbols":"Key dream symbols and their meanings (2 sentences)","message":"What the subconscious is communicating (2 sentences)","warning":"Spiritual warning or guidance (1-2 sentences)","advice":"One profound dream prophecy"}`;
  }
  else if(currentCat==='coffee'){
    msgContent=[...uploadedImages.map(img=>({type:'image',source:{type:'base64',media_type:img.type,data:img.base64}})),{type:'text',text:`You are a legendary Turkish coffee cup reader (tasseography). Read the cup for ${name}.${bdi}${bti}${qi}\n${li}\nOnly raw JSON: {"symbols":"Describe shapes and symbols you see (2 sentences)","love":"Love message from the cup (2 sentences)","future":"Near future revealed (2-3 sentences)","advice":"One mystical coffee prophecy"}`}];
  }

  try{
    const body=msgContent?{messages:[{role:'user',content:msgContent}]}:{prompt};
    const res=await fetch('/api/fortune',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    const reading=JSON.parse(data.text.replace(/```json|```/g,'').trim());
    const html=buildHTML(reading);
    document.getElementById('reading-content').innerHTML=html;
    document.getElementById('action-row').style.display='flex';
    if(currentCat==='tarot'){
      const total=Object.keys(reading).filter(k=>k.startsWith('card')).length;
      autoReveal(total);
    }
    saveHist({cat:T[lang].cats[currentCat],name:name+(selectedSign?' · '+selectedSign:''),date:new Date().toLocaleDateString(lang==='tr'?'tr-TR':'en-US',{day:'numeric',month:'short',year:'numeric'}),icon:icons[currentCat],preview:document.getElementById('reading-content').innerText.slice(0,100),html});
  }catch(e){
    document.getElementById('reading-content').innerHTML=`<p style="color:var(--muted);text-align:center;font-style:italic;padding:2rem 0">${lang==='tr'?'Kozmik bağlantı kesildi. Tekrar dene.':'Connection interrupted. Try again.'}</p>`;
    document.getElementById('action-row').style.display='flex';
  }
}

function buildHTML(r){
  const S=T[lang].secs;
  if(currentCat==='tarot'){
    const cardKeys=Object.keys(r).filter(k=>k.startsWith('card'));
    const spread=cardKeys.map((k,i)=>{
      const c=r[k];
      const imgUrl=getCardImg(c.englishName||c.name||'');
      return`<div class="tarot-card-wrap">
        <div class="tarot-card" id="tc-${i}">
          <div class="card-face card-back-face"><div class="cbm"></div><div class="cbt">Mystic AI</div></div>
          <div class="card-face card-front-face">
            <img src="${imgUrl}" alt="${c.displayName||c.englishName||''}" loading="eager" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg'"/>
            <div class="card-sheen"></div>
          </div>
        </div>
        <div class="card-lbl" id="lbl-${i}">
          <div class="card-lbl-name">${c.displayName||c.englishName||''}</div>
          <div class="card-lbl-pos">${c.position||''}</div>
        </div>
      </div>`;
    }).join('');
    const interp=r.interpretation?`<div class="tarot-interp" id="tarot-interp"><div class="tarot-interp-box">${r.interpretation.split('\n').filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join('')}</div></div>`:'';
    return`<div class="tarot-spread">${spread}</div>${interp}`;
  }
  return Object.keys(r).map((k,i)=>{
    const label=S[k]||k;
    if(k==='advice')return`<div class="divider"></div><div class="section-title">${label}</div><div class="prophecy">"${r[k]}"</div>`;
    return`${i>0?'<div class="divider"></div>':''}<div class="section-title">${label}</div><p class="section-text">${r[k]}</p>`;
  }).join('');
}

function autoReveal(total){
  let i=0;
  function next(){
    if(i>=total){
      setTimeout(()=>{const interp=document.getElementById('tarot-interp');if(interp)interp.classList.add('show');},400);
      return;
    }
    const card=document.getElementById('tc-'+i);
    const lbl=document.getElementById('lbl-'+i);
    if(card){
      card.classList.add('flipped');
      spawnParticles(card);
      setTimeout(()=>{if(lbl)lbl.classList.add('show');},600);
    }
    i++;
    setTimeout(next,1400);
  }
  setTimeout(next,700);
}

function spawnParticles(cardEl){
  const rect=cardEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  for(let j=0;j<8;j++){
    const p=document.createElement('div');p.className='particle';
    const size=3+Math.random()*5,angle=Math.random()*Math.PI*2,dist=20+Math.random()*40;
    const colors=['#9b6dff','#c4a0ff','#d4af70','#f0d090','#ffffff'];
    p.style.cssText=`width:${size}px;height:${size}px;left:${cx+Math.cos(angle)*dist}px;top:${cy+Math.sin(angle)*dist}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.3}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1500);
  }
}

function resetForm(){
  document.getElementById('result').style.display='none';document.getElementById('landing').style.display='flex';
  document.getElementById('name').value='';document.getElementById('question').value='';document.getElementById('dream-input').value='';
  document.querySelectorAll('.sign-btn').forEach(b=>b.classList.remove('active'));
  selectedSign='';uploadedImages=[];document.getElementById('upload-preview').innerHTML='';
  window.scrollTo(0,0);
}

function shareReading(){
  const text=document.getElementById('reading-content').innerText;
  if(navigator.share)navigator.share({title:'Mystic AI',text,url:window.location.href});
  else navigator.clipboard.writeText('Mystic AI:\n\n'+text+'\n\n'+window.location.href).then(()=>alert(T[lang].copied));
}
